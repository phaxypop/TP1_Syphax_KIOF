<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kiss of Life Official Website</title>

    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="normalize.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="images/KIOF_favicon.png" />
  </head>
  <body>
    <script src="JS/script.js"></script>
    <header>
      <div class="Logo">
        <a href="index.htm"
          ><img src="images/kiof_logo.svg" alt="kiof logo"
        /></a>
      </div>
      <div class="Menu">
        <a href="#Music">Music</a>
        <a href="#Videos">Videos</a>
        <a href="#Gallery">Gallery</a>
        <a href="#Members">Members</a>
        <a href="https://kissoflife-official.com/shop/kr">Store</a>
      </div>
    </header>
    <main>
      <div id="Home">
        <video autoplay loop muted playsinline class="background-video">
          <source src="videos/kiof_video.mp4" type="video/mp4" />
        </video>

        <div class="overlay"></div>

        <div class="hero-text">
          <h1>KISS OF LIFE</h1>
          <p>The Official Fan Experience</p>
        </div>
      </div>
      <section id="Music">
        <div class="music-content">
          <h2>Music</h2>

          <iframe
            data-testid="embed-iframe"
            style="border-radius: 12px"
            src="https://open.spotify.com/embed/artist/4TEK9tIkcoxib4GxT3O4ky?utm_source=generator"
            width="100%"
            height="450"
            frameborder="0"
            allowfullscreen=""
            allow="
              autoplay;
              clipboard-write;
              encrypted-media;
              fullscreen;
              picture-in-picture;
            "
            loading="lazy"
          ></iframe>
        </div>
        <h2>Albums</h2>

        <div class="carousel">
          <button class="carousel-btn left" onclick="moveSlide(-1)">❮</button>
          <div class="carousel-window">
            <div class="carousel-track">
              <div class="album">
                <a
                  href="https://open.spotify.com/album/5k34rAvlw3WV7Kh6dAZnxG?si=C3AnTGBPRL-ORtxn34egIA"
                  ><img
                    src="images/KIOF_KISS_OF_LIFE_album_cover.webp"
                    alt="KIOF 2023"
                /></a>
                <h5 class="album-title">Kiss Of Life</h5>
              </div>

              <div class="album">
                <a
                  href="https://open.spotify.com/album/6yDtQxvq1XRC7Y5qtS03Xx?si=5HT0XsxzSnmuaoiD4C1Wzg"
                  ><img
                    src="images/KISS_OF_LIFE_Born_to_be_XX_digital_album_cover.webp"
                    alt="KIOF 2023"
                /></a>
                <h5 class="album-title">Born to Be XX</h5>
              </div>

              <div class="album">
                <a
                  href="https://open.spotify.com/album/1HfTA0xDoZ0mswFO3GB3ef?si=nV3OuovlR_OUmIiqn0S4eg"
                  ><img
                    src="images/KISS_OF_LIFE_Midas_Touch_digital_cover.webp"
                    alt="KIOF 2024"
                /></a>
                <h5 class="album-title">Midas Touch (single)</h5>
              </div>
              <div class="album">
                <a
                  href="https://open.spotify.com/album/3p68B7ZhETVmNbOov8JcF5?si=k4BPzuEoSniqVNYlfZFsUw"
                  ><img
                    src="images/KIOF_Sticky_album_cover.webp"
                    alt="KIOF 2024"
                /></a>
                <h5 class="album-title">Sticky (single)</h5>
              </div>
              <div class="album">
                <a
                  href="https://open.spotify.com/album/4eguh1dJUXRh0IMiLKRwab?si=J3haKTenSaedctWXUjmMIA"
                  ><img
                    src="images/KISS_OF_LIFE_Lose_Yourself_digital_album_cover.webp"
                    alt="KIOF 2024"
                /></a>
                <h5 class="album-title">Lose Yourself</h5>
              </div>

              <div class="album">
                <a
                  href="https://open.spotify.com/album/0drBJNDdHv4qK7XfPtBqee?si=gdpQwLSITxSnhnM3PFd9MQ"
                  ><img
                    src="images/KISS_OF_LIFE_Kiss_Road_album_cover.webp"
                    alt="KIOF 2025"
                /></a>
                <h5 class="album-title">Kiss Road</h5>
              </div>
              <div class="album">
                <a
                  href="https://open.spotify.com/album/20GxuSxICpXyRYkoqRjthR?si=WkhHvsIQQh2IO7BRPSq1Iw"
                  ><img
                    src="images/KISS_OF_LIFE_224_digital_album_cover.webp"
                    alt="KIOF 2025"
                /></a>
                <h5 class="album-title">224</h5>
              </div>
              <div class="album">
                <a
                  href="https://open.spotify.com/album/3isrBYAYBxBerWHVtjD8gE?si=zQbP07nHTJu5Zq1yS_TwTw"
                  ><img
                    src="images/KISS_OF_LIFE_Tokyo_Mission_Start_29_album_cover.webp"
                    alt="KIOF 2025"
                /></a>
                <h5 class="album-title">Tokyo Mission Start</h5>
              </div>
            </div>
          </div>

          <button class="carousel-btn right" onclick="moveSlide(1)">❯</button>
        </div>
      </section>
      <section id="Videos">
        <h2>Videos</h2>

        <div class="video-carousel">
          <button class="video-btn left" onclick="changeVideo(-1)">❮</button>

          <iframe
            id="video-player"
            width="900"
            height="500"
            src="https://www.youtube.com/embed/IajeQM00yfE"
            title="YouTube video player"
            frameborder="0"
            allow="
              accelerometer;
              autoplay;
              clipboard-write;
              encrypted-media;
              gyroscope;
              picture-in-picture;
            "
            allowfullscreen
          >
          </iframe>

          <button class="video-btn right" onclick="changeVideo(1)">❯</button>
        </div>
      </section>
      <section id="Gallery">
        <h2>Gallery</h2>
      </section>
      <section id="Members">
        <h2>Members</h2>
      </section>
    </main>
    <footer></footer>
  </body>
</html>
